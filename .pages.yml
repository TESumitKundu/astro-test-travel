media:
  input: public/uploads
  output: /uploads

content:
  - name: tours
    label: Tours
    type: collection
    path: src/content/tours
    filename: "{fields.slug}.md"
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        required: true
      - name: place
        label: Place
        type: string
        required: true
      - name: duration
        label: Duration
        type: object
        required: true
        fields:
          - name: days
            label: Days
            type: number
            required: true
          - name: nights
            label: Nights
            type: number
            required: true
      - name: bestMonths
        label: Best Months
        type: select
        required: true
        options:
          multiple: true
          values:
            - January
            - February
            - March
            - April
            - May
            - June
            - July
            - August
            - September
            - October
            - November
            - December
      - name: season
        label: Season
        type: select
        required: true
        options:
          multiple: true
          values:
            - Spring
            - Summer
            - Monsoon
            - Autumn
            - Winter
      - name: travelStyle
        label: Travel Style
        type: select
        required: true
        options:
          multiple: true
          values:
            - Mountain
            - Forest
            - Pilgrimage
            - Beach
            - Heritage
            - Backwater
            - Wildlife
            - Adventure
            - Culture
            - Leisure
      - name: placesToCover
        label: Places to Cover
        type: object
        list: true
        required: false
        fields:
          - name: name
            label: Place Name
            type: string
            required: true
          - name: nights
            label: Nights
            type: number
            required: true
      - name: coverImage
        label: Cover Image Upload
        type: image
        required: false
      - name: coverImageUrl
        label: Cover Image URL
        type: string
        required: false
        description: Optional. Use this for Unsplash, CDN, or any external image URL. If filled, it will be used instead of the uploaded image.
      - name: costInr
        label: Starting From INR
        type: number
        required: true
      - name: minHeadCount
        label: Minimum Head Count
        type: number
        required: true
      - name: featured
        label: Featured
        type: boolean
        default: false
      - name: draft
        label: Draft
        type: boolean
        default: false
      - name: seoTitle
        label: SEO Title
        type: string
        required: false
      - name: seoDescription
        label: SEO Description
        type: text
        required: false
      - name: body
        label: Day-wise Itinerary
        type: rich-text
        required: false

  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    filename: "{fields.slug}.md"
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        required: true
      - name: seoTitle
        label: SEO Title
        type: string
        required: false
      - name: seoDescription
        label: SEO Description
        type: text
        required: false
      - name: body
        label: Content
        type: rich-text

  - name: hotels
    label: Hotels
    type: collection
    path: src/content/hotels
    filename: "{fields.name}.md"
    format: yaml-frontmatter
    fields:
      - name: name
        label: Hotel Name
        type: string
        required: true
      - name: place
        label: Place
        type: string
        required: true
      - name: startingRoomPriceInr
        label: Starting Room Price INR
        type: number
        required: true
      - name: images
        label: Hotel Images
        type: image
        list: true
        required: true
      - name: website
        label: Website
        type: string
        required: false
      - name: note
        label: Short Note
        type: text
        required: true
      - name: featured
        label: Featured on Home
        type: boolean
        default: true
      - name: draft
        label: Draft
        type: boolean
        default: false

  - name: siteSettings
    label: Site Settings
    type: file
    path: config/site.json
    format: json
    fields:
      - name: siteName
        label: Site Name
        type: string
      - name: siteDescription
        label: Site Description
        type: text
      - name: logo
        label: Logo
        type: image
      - name: favicon
        label: Favicon
        type: image
      - name: email
        label: Email
        type: string
      - name: phone
        label: Phone
        type: string
      - name: socialLinks
        label: Social Links
        type: object
        fields:
          - name: facebook
            label: Facebook
            type: string
          - name: instagram
            label: Instagram
            type: string
          - name: twitter
            label: Twitter
            type: string
          - name: linkedin
            label: LinkedIn
            type: string
      - name: heroMoodTiles
        label: Hero Mood Tiles
        type: object
        list: true
        fields:
          - name: label
            label: Label
            type: string
            required: true
          - name: image
            label: Image URL
            type: string
            required: true
          - name: style
            label: Travel Style Filter
            type: select
            required: true
            options:
              values:
                - Mountain
                - Forest
                - Pilgrimage
                - Beach
                - Heritage
                - Backwater
                - Wildlife
                - Adventure
                - Culture
                - Leisure
          - name: href
            label: Link
            type: string
            required: true
          - name: meta
            label: Short Meta Text
            type: string
            required: false
