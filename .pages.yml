media:
  input: public/uploads
  output: /uploads

content:
  - name: tours
    label: Tours
    type: collection
    path: src/content/tours
    filename: "{fields.slug}.md"
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        required: true
      - name: place
        label: Place
        type: string
        required: true
      - name: duration
        label: Duration
        type: object
        required: true
        fields:
          - name: days
            label: Days
            type: number
            required: true
          - name: nights
            label: Nights
            type: number
            required: true
      - name: bestMonths
        label: Best Months
        type: select
        list: true
        required: true
        options:
          - label: January
            value: January
          - label: February
            value: February
          - label: March
            value: March
          - label: April
            value: April
          - label: May
            value: May
          - label: June
            value: June
          - label: July
            value: July
          - label: August
            value: August
          - label: September
            value: September
          - label: October
            value: October
          - label: November
            value: November
          - label: December
            value: December
      - name: season
        label: Season
        type: select
        required: true
        options:
          - label: Spring
            value: Spring
          - label: Summer
            value: Summer
          - label: Monsoon
            value: Monsoon
          - label: Autumn
            value: Autumn
          - label: Winter
            value: Winter
      - name: coverImage
        label: Cover Image
        type: image
        required: true
      - name: costInr
        label: Cost in INR
        type: number
        required: true
      - name: minHeadCount
        label: Minimum Head Count
        type: number
        required: true
      - name: featured
        label: Featured
        type: boolean
        default: false
      - name: draft
        label: Draft
        type: boolean
        default: false
      - name: seoTitle
        label: SEO Title
        type: string
        required: false
      - name: seoDescription
        label: SEO Description
        type: text
        required: false
      - name: body
        label: Day-wise Itinerary
        type: rich-text

  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    filename: "{fields.slug}.md"
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        required: true
      - name: seoTitle
        label: SEO Title
        type: string
        required: false
      - name: seoDescription
        label: SEO Description
        type: text
        required: false
      - name: body
        label: Content
        type: rich-text

  - name: siteSettings
    label: Site Settings
    type: file
    path: config/site.json
    format: json
    fields:
      - name: siteName
        label: Site Name
        type: string
      - name: siteDescription
        label: Site Description
        type: text
      - name: logo
        label: Logo
        type: image
      - name: email
        label: Email
        type: string
      - name: phone
        label: Phone
        type: string
      - name: socialLinks
        label: Social Links
        type: object
        fields:
          - name: facebook
            label: Facebook
            type: string
          - name: twitter
            label: Twitter
            type: string
          - name: linkedin
            label: LinkedIn
            type: string
          - name: github
            label: GitHub
            type: string
